<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Online Voting System</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        body {
            background: url('https://t4.ftcdn.net/jpg/05/50/34/75/360_F_550347527_a4E35eFyM3s5KhwaUMoGmqgJQf9Ub48q.jpg') center/cover fixed;
            margin: 0;
            font-family: 'Open Sans', sans-serif;
        }

        .navbar {
            position: fixed;
            top: 0;
            right: 0;
            padding: 15px;
            z-index: 1000;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
        }

        .jumbotron {
            background-color: transparent;
            padding: 40px;
            margin-top: 20px;
            text-align: center;
            color: #343a40;
        }

        .my-4,
        .my-5 {
            display: none; /* Remove or comment out these lines to hide the lines */
        }

        #ballotBox {
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            margin: 0 auto; /* Center the image horizontally */
            margin-left: -3cm; /* Move the image 3cm to the left */
        }

        #ballotBox:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        }

        @keyframes bounce {
            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }

            60% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>

    <!-- Navigation bar for home and about buttons -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/about">About</a>
    </div>

    <div class="container">
        <div class="jumbotron">
            <hr class="my-4">
            <div class="d-flex justify-content-center align-items-center">
                <img id="ballotBox"
                    src="https://img.freepik.com/premium-photo/vote-button-with-blue-light-white-background-3d-illustration_556904-290.jpg?w=1060"
                    alt="Ballot Box" width="300" height="300" onclick="bounceImage()" class="img-fluid rounded" />
            </div>
            <hr class="my-5">
        </div>
    </div>

    <script>
        function bounceImage() {
            var ballotBox = document.getElementById('ballotBox');
            ballotBox.style.animation = 'bounce 0.5s';
            setTimeout(function () {
                ballotBox.style.animation = '';
                // Redirect to the dashboard after the animation
                window.location.href = '/dashboard'; // Replace '/dashboard' with the actual URL of your dashboard
            }, 500);
        }
    </script>

</body>

</html>
